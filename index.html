<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>

<body>
    <div class="form-container">
        <h2>Iniciar Sesion</h2>
        <form name="login-form" id="login-form">
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="button" id="login-btn" class="auth-button">Iniciar Sesion</button>
            <button type="button" class="text-button">Olvidaste la contraseña?</button>
            <a href="templates/register.html" type="button" class="text-button" id="register-button">Crear cuenta</a>
        </form>
    </div>
    <script src=" https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script type="module" src="./controller/index.js""></script>
</body>

</html>
